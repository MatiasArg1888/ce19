<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CODIGO ESCONDIDO 19</title>
  <style>
    :root {
      --purpura: #71106f;
      --dorado: #ffd75e;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--purpura);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 420ms ease;
      background: #fcfaff;
    }

    #app-frame.visible {
      opacity: 1;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: white;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,.18), transparent 19rem),
        linear-gradient(145deg, #260023, #71106f 46%, #230023);
      transition: opacity 520ms ease, visibility 520ms ease;
      z-index: 3;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .stars {
      position: absolute;
      inset: -12%;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 1.8px);
      background-size: 82px 82px, 137px 137px;
      animation: drift 8s linear infinite;
      opacity: .75;
    }

    .center {
      position: relative;
      width: min(86vw, 680px);
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .star {
      width: min(52vw, 230px);
      aspect-ratio: 1;
      margin: 0 auto 22px;
      border-radius: 50%;
      background-image: url("assets/intro_pc.webp");
      background-size: cover;
      background-position: center;
      filter: drop-shadow(0 0 28px rgba(255,255,255,.55));
      animation: pulse 1.7s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 8vw, 58px);
      letter-spacing: 0;
      line-height: 1;
      font-weight: 800;
    }

    .verse {
      margin-top: 22px;
      color: var(--dorado);
      font-weight: 800;
      font-size: clamp(16px, 4vw, 22px);
    }

    .message {
      margin-top: 14px;
      color: rgba(255,255,255,.84);
      font-size: clamp(13px, 3vw, 16px);
    }

    .bar {
      width: min(320px, 70vw);
      height: 5px;
      margin: 28px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
    }

    .bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, var(--dorado), transparent);
      animation: load 1.15s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.065); }
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(46px, -58px, 0); }
    }

    @keyframes load {
      from { transform: translateX(-120%); }
      to { transform: translateX(260%); }
    }
  </style>
</head>
<body>
  <iframe id="app-frame" title="CODIGO ESCONDIDO 19" src="app/?skip_intro=1"></iframe>
  <main id="loader">
    <div class="stars"></div>
    <section class="center">
      <div class="star"></div>
      <h1>CODIGO ESCONDIDO 19</h1>
      <div class="verse">Apocalipsis 13:18 - Romanos 10:9</div>
      <div class="message">Preparando la aplicacion...</div>
      <div class="bar"></div>
    </section>
  </main>
  <script>
    const loader = document.getElementById("loader");
    const frame = document.getElementById("app-frame");
    const started = Date.now();

    function mostrarApp() {
      const espera = Math.max(0, 1400 - (Date.now() - started));
      setTimeout(() => {
        frame.classList.add("visible");
        loader.classList.add("hidden");
      }, espera);
    }

    frame.addEventListener("load", mostrarApp, { once: true });
  </script>
</body>
</html>
