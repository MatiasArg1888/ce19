name: Publicar instaladores

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Etiqueta de version para la Release"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  android:
    name: Crear APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet==0.85.3 flet-audio==0.85.3 "pillow>=10.0.0"

      - name: Construir APK
        run: |
          flet build apk --project codigo_escondido_19 --artifact "CODIGO ESCONDIDO 19" --product "CODIGO ESCONDIDO 19" --description "Aplicacion Codigo Escondido 19" --company "CODIGO ESCONDIDO 19" --org com.flet --bundle-id com.flet.app_ce_19 --android-adaptive-icon-background "#71106F" --splash-color "#71106F" --splash-dark-color "#71106F" --build-version 1.0.0 --no-rich-output --yes
          mkdir -p release
          cp build/apk/*.apk release/CODIGO-ESCONDIDO-19-ANDROID.apk

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/CODIGO-ESCONDIDO-19-ANDROID.apk

  windows:
    name: Crear paquete Windows
    runs-on: windows-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar Flet
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet==0.85.3 flet-audio==0.85.3 "pillow>=10.0.0"

      - name: Construir Windows
        shell: pwsh
        run: |
          flet build windows --project codigo_escondido_19 --artifact "CODIGO ESCONDIDO 19" --product "CODIGO ESCONDIDO 19" --description "Aplicacion Codigo Escondido 19" --company "CODIGO ESCONDIDO 19" --org com.flet --bundle-id com.flet.app_ce_19 --build-version 1.0.0 --no-rich-output --yes
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $origen = "build\flutter\build\windows\x64\runner\Release"
          Compress-Archive -Path "$origen\*" -DestinationPath "release\CODIGO-ESCONDIDO-19-WINDOWS.zip" -Force

      - name: Subir paquete Windows como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: release/CODIGO-ESCONDIDO-19-WINDOWS.zip

  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows

    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Publicar archivos descargables
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: CODIGO ESCONDIDO 19 ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            Descargas publicadas para CODIGO ESCONDIDO 19.

            - Android: CODIGO-ESCONDIDO-19-ANDROID.apk
            - Windows: CODIGO-ESCONDIDO-19-WINDOWS.zip
          files: |
            release/android-apk/CODIGO-ESCONDIDO-19-ANDROID.apk
            release/windows-zip/CODIGO-ESCONDIDO-19-WINDOWS.zip
