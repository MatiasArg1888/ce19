name: Publicar app web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verificar Flutter
        run: flutter --version

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-audio

      - name: Construir version web
        run: |
          flet build web --base-url /ce19/ --yes --no-rich-output --skip-flutter-doctor --cleanup-app --exclude .git .github .venv env build dist dist_windows backups logs storage instalador __pycache__ "*.pyc" README.md .gitignore datos/exportaciones datos/historial.json datos/guardados.json datos/carpetas.json datos/config_tiempo.json datos/analisis_colores_historial.json datos/historial_referencias_biblia.json datos/favoritos_biblia.json datos/notas_biblia.json datos/resaltados_biblia.json datos/ultima_lectura_biblia.json

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto web
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
