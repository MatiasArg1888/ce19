name: Publicar app web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verificar Flutter
        run: flutter --version

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-audio "pillow>=10.0.0"

      - name: Construir version web
        run: |
          flet build web --base-url /ce19/ --yes --no-rich-output --skip-flutter-doctor

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto web
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
